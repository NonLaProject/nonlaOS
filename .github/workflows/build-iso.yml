name: ISO build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "iso/**"
      - "tools/**"
      - ".github/workflows/build-iso.yml"

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build ISO in Debian trixie
        run: |
          docker run --rm --privileged \
            -e DEBIAN_FRONTEND=noninteractive \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:trixie \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                devscripts \
                dpkg-dev \
                debhelper \
                dctrl-tools \
                lintian \
                apt-utils \
                live-build \
                python3 \
                genisoimage \
                xorriso \
                grub-efi-amd64-bin \
                grub-efi-ia32-bin \
                grub-pc-bin \
                isolinux \
                syslinux \
                syslinux-common \
                syslinux-efi \
                syslinux-utils \
                squashfs-tools
              ./tools/build-iso.sh
              chown -R "${HOST_UID}:${HOST_GID}" dist
            '

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nonlaos-packages
          path: |
            dist/packages/*.deb
            dist/packages/*.changes
            dist/packages/*.buildinfo
          if-no-files-found: error

      - name: Upload APT repository artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nonlaos-apt-repo
          path: dist/repo/
          if-no-files-found: error

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nonlaos-iso
          path: |
            dist/iso/*.iso
            dist/logs/*
          if-no-files-found: error
